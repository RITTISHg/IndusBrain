version: "3.8"

services:
  # Python FastAPI Application Core
  fastapi_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://indus_user:indus_secure_pass@postgres_db:5432/indus_brain
      - NEO4J_URI=bolt://neo4j_graph:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=indus_graph_secure
      - CHROMADB_HOST=chroma_db
      - CHROMADB_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-super_secret_indus_brain_key}
    depends_on:
      - postgres_db
      - neo4j_graph
      - chroma_db
    restart: always

  # Relational Store for user profiles, session telemetry and activity audits
  postgres_db:
    image: postgres:15-alpine
    container_name: indus_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=indus_user
      - POSTGRES_PASSWORD=indus_secure_pass
      - POSTGRES_DB=indus_brain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Knowledge Graph database for industrial equipment, regulations, standards dependencies
  neo4j_graph:
    image: neo4j:5.12-community
    container_name: indus_neo4j
    ports:
      - "7474:7474" # HTTP Dashboard
      - "7687:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/indus_graph_secure
    volumes:
      - neo4j_data:/data
    restart: always

  # Vector Database for semantic document search, safety logs, compliance indexes
  chroma_db:
    image: chromadb/chroma:0.4.15
    container_name: indus_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma_data
    restart: always

volumes:
  postgres_data:
  neo4j_data:
  chroma_data:
